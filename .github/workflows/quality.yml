name: Quality Checks

on:
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday 06:00 UTC
  pull_request:
    paths:
      - "src/repo_finder/**.py"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy src/

      - name: Unit tests
        run: pytest tests/ -v -m "not integration"

      - name: Integration tests
        run: pytest tests/ -v -m "integration"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Quality check against corpus
        run: python scripts/run_quality_checks.py --output reports/quality_ci.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: reports/*.json
